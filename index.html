<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
<title>Daily Brief</title>

<!-- PWA / iOS home-screen app -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Brief">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="lockscreen" id="lockscreen" hidden>
  <form class="lock-card" id="lock-form">
    <div class="lock-mark">DB</div>
    <h1>Daily Brief</h1>
    <p class="lock-sub">Enter your passcode to unlock today's brief.</p>
    <input type="password" id="lock-input" inputmode="numeric" autocomplete="current-password"
           aria-label="Passcode" placeholder="Passcode">
    <button type="submit">Unlock</button>
    <p class="lock-error" id="lock-error" hidden>That passcode didn't work. Try again.</p>
    <label class="lock-remember"><input type="checkbox" id="lock-remember" checked> Remember on this device</label>
  </form>
</div>

<div class="app" id="app" hidden>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="wordmark">Daily Brief</h1>
      <p class="freshness" id="freshness">Loading&hellip;</p>
    </div>
    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab is-active" data-tab="today" role="tab">Today</button>
      <button class="tab" data-tab="week" role="tab">This Week</button>
      <button class="tab" data-tab="todos" role="tab">To-Dos</button>
    </nav>
  </header>

  <main class="content">
    <section class="panel is-active" id="panel-today" role="tabpanel"></section>
    <section class="panel" id="panel-week" role="tabpanel"></section>
    <section class="panel" id="panel-todos" role="tabpanel"></section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
